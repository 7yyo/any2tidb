# ┌─────────────────────────────────────────────────────────────────────────┐
# │  any2tidb  — Any DB → TiDB  完整配置说明                               │
# │                                                                         │
# │  Usage（将 any2tidb、application.yml 与 jar 放同目录，直接运行）:       │
# │    ./any2tidb                                                           │
# │                                                                         │
# │  Dry-run（只打印 DDL，不写入 TiDB）:                                    │
# │    ./any2tidb --dry-run                                                 │
# │                                                                         │
# │  命令行临时指定表（覆盖 convert.tables 配置）:                           │
# │    ./any2tidb --tables=orders,customers                                 │
# │                                                                         │
# │  配置文件不在当前目录时:                                                  │
# │    ./any2tidb \                                                         │
# │         --spring.config.location=/path/to/application.yml              │
# └─────────────────────────────────────────────────────────────────────────┘

source:
  host: 127.0.0.1
  port: 1433
  username: sa
  password: "Test1234!"

target:
  host: 127.0.0.1
  port: 4000
  username: root
  password: ""

convert:
  # ── 场景 1：全实例迁移（所有用户库、所有 schema、所有表）────────────────────
  #schemas: []
  #tables: []

  # ── 场景 2：按 schema 过滤（每个库只迁移指定 schema 下的表）─────────────────
  schemas:
    - audit
  #  - dbo
  # tables: []

  # ── 场景 3：按表名过滤（每个库里匹配指定表名，schema 不限）──────────────────
  # schemas: []
  # tables:
  #   - orders
  #   - customers
  #   - products

  # ── 场景 4：schema + 表名双重过滤（只迁移指定 schema 下的指定表）────────────
  # schemas:
  #   - sales
  # tables:
  #   - orders
  #   - order_lines

  # TiDB 中已存在同名表时先 DROP 再建（false = 保留已存在的表）
  dropIfExists: true

  # 遇到某张表失败时是否继续迁移剩余表（false = 遇到第一个错误就停止）
  continueOnError: true

dump:
  # 输出目录，默认当前目录（空字符串 = 当前目录）
  outputDir: ""

  # 每个 CSV 文件的最大大小（MB）；0 = 不切分
  fileSizeMb: 256

  # JDBC 服务端游标每批拉取的行数，影响内存占用（每批约 fileSizeMb/行大小）
  chunkSize: 10000

  # 是否同时生成与 CSV 配套的 CREATE TABLE .sql 文件（供 TiDB Lightning 使用）
  generateSchema: true

  # SELECT 时是否加 WITH (NOLOCK)，减少对生产库的锁竞争（允许脏读）
  nolock: true

  # 是否使用快照隔离（SNAPSHOT ISOLATION），需 SA 权限
  # true = 自动开启库级快照隔离，导出连接使用 SNAPSHOT 隔离级别，记录 startLsn 供增量衔接
  # false = 使用 nolock 配置（默认）
  snapshotIsolation: false

  # 并发导出的表数量（每张表一个独立线程 + 连接）
  concurrency: 4
